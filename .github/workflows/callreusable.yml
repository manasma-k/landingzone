name: Deploy Environment
on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")

          DIRS=$(echo "$CHANGED" | grep '^environment/' | awk -F/ '{print $2"/"$3}' | sort -u || true)

          VALID_DIRS=$(echo "$DIRS" | while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            if compgen -G "environment/$dir/*.tf" > /dev/null; then
              echo "$dir"
            fi
          done)

          MATRIX=$(echo "$VALID_DIRS" | jq -R -s -c '
            split("\n")[:-1] |
            map(split("/") | {environment: .[0], application: .[1]}) |
            {include: .}
          ')

          if [ -z "$MATRIX" ] || [ "$MATRIX" = '{"include":[]}' ]; then
            MATRIX='{"include":[]}'
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  ensure_state_container:
    needs: discover
    if: ${{ fromJson(needs.discover.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET || secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}"}'

      - name: Ensure state container exists
        env:
          STATE_RG: ${{ secrets.STATE_RG || secrets.BACKEND_RESOURCE_GROUP_NAME || secrets.TFSTATE_RESOURCE_GROUP }}
          STATE_STORAGE: ${{ secrets.STATE_STORAGE || secrets.BACKEND_STORAGE_ACCOUNT_NAME || secrets.TFSTATE_STORAGE_ACCOUNT }}
        run: |
          KEY=$(az storage account keys list \
            --resource-group "$STATE_RG" \
            --account-name "$STATE_STORAGE" \
            --query "[0].value" \
            -o tsv)

          az storage container create \
            --name terraform-state \
            --account-name "$STATE_STORAGE" \
            --account-key "$KEY" \
            --fail-on-exist \
            --output none || true

  deploy:
    needs:
      - discover
      - ensure_state_container
    if: ${{ fromJson(needs.discover.outputs.matrix).include[0] != null }}

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    uses: manasma-k/Deploy-resusable/.github/workflows/deploy-reusable.yml@main
    with:
      environment: ${{ matrix.environment }}
      application: ${{ matrix.application }}

    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET || secrets.ARM_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}
      STATE_RG: ${{ secrets.STATE_RG || secrets.BACKEND_RESOURCE_GROUP_NAME || secrets.TFSTATE_RESOURCE_GROUP }}
      STATE_STORAGE: ${{ secrets.STATE_STORAGE || secrets.BACKEND_STORAGE_ACCOUNT_NAME || secrets.TFSTATE_STORAGE_ACCOUNT }}