name: Deploy Environment
on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")

          DIRS=$(echo "$CHANGED" | grep '^environment/' | awk -F/ '{print $2"/"$3}' | sort -u || true)

          MATRIX=$(echo "$DIRS" | jq -R -s -c '
            split("\n")[:-1] |
            map(split("/") | {environment: .[0], application: .[1]}) |
            {include: .}
          ')

          if [ -z "$MATRIX" ] || [ "$MATRIX" = '{"include":[]}' ]; then
            MATRIX='{"include":[]}'
          fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  deploy:
    needs: discover
    if: ${{ fromJson(needs.discover.outputs.matrix).include[0] != null }}

    permissions:
      contents: read
      id-token: write

    strategy:
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    uses: manasma-k/Deploy-resusable/.github/workflows/deploy-reusable.yml@main
    with:
      environment: ${{ matrix.environment }}
      application: ${{ matrix.application }}

    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      STATE_RG: ${{ secrets.STATE_RG || secrets.BACKEND_RESOURCE_GROUP_NAME || secrets.TFSTATE_RESOURCE_GROUP }}
      STATE_STORAGE: ${{ secrets.STATE_STORAGE || secrets.BACKEND_STORAGE_ACCOUNT_NAME || secrets.TFSTATE_STORAGE_ACCOUNT }}